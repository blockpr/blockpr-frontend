<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Globe — Particles</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020408; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; color: #fff; }
  canvas { display: block; position: fixed; inset: 0; }

  #ui {
    position: fixed; top: 24px; right: 24px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 20px 22px; width: 230px;
    backdrop-filter: blur(12px); z-index: 10;
    display: flex; flex-direction: column; gap: 14px;
  }
  #ui h2 { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.25); }
  .row { display: flex; flex-direction: column; gap: 6px; }
  .row label { display: flex; justify-content: space-between; font-size: 12px; color: rgba(255,255,255,0.4); }
  .row label span { color: rgba(255,255,255,0.8); }
  input[type=range] {
    -webkit-appearance: none; width: 100%; height: 2px;
    background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px;
    border-radius: 50%; background: #fff; cursor: pointer;
  }
  .hint { font-size: 11px; color: rgba(255,255,255,0.18); line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h2>Globe — Particles</h2>
  <div class="row">
    <label>Contorno continentes <span id="vCoastN">—</span></label>
    <input type="range" id="sSpacing" min="1" max="8" value="3" step="0.5" />
  </div>
  <div class="row">
    <label>Relleno continentes <span id="vLandN">2000</span></label>
    <input type="range" id="sLand" min="200" max="6000" value="2000" step="100" />
  </div>
  <div class="row">
    <label>Partículas océano <span id="vOceanN">320</span></label>
    <input type="range" id="sOcean" min="50" max="900" value="320" step="10" />
  </div>
  <div class="row">
    <label>Brillo costa <span id="vCG">1.0</span></label>
    <input type="range" id="sCG" min="2" max="30" value="10" step="1" />
  </div>
  <div class="row">
    <label>Brillo relleno <span id="vLG">0.6</span></label>
    <input type="range" id="sLG" min="1" max="20" value="6" step="1" />
  </div>
  <div class="row">
    <label>Brillo océano <span id="vOG">0.5</span></label>
    <input type="range" id="sOG" min="1" max="20" value="5" step="1" />
  </div>
  <div class="row">
    <label>Shimmer <span id="vShim">0.15</span></label>
    <input type="range" id="sShim" min="0" max="40" value="15" step="1" />
  </div>
  <div class="row">
    <label>Velocidad <span id="vSpd">1.0x</span></label>
    <input type="range" id="sSpd" min="0" max="40" value="10" step="1" />
  </div>
  <p class="hint">Arrastrá para girar · Scroll para inclinar</p>
</div>

<script>
// ── Continentes ───────────────────────────────────────────────────────────
const CONTINENTS = [

  [[-77,8],[-73,12],[-67,11],[-63,11],[-60,8],[-60,5],[-52,4],[-51,-1],[-35,-4],[-35,-8],[-38,-13],[-40,-20],[-44,-23],[-48,-26],[-50,-29],[-52,-33],[-57,-38],[-60,-38],[-63,-38],[-65,-42],[-66,-48],[-68,-55],[-66,-55],[-67,-51],[-66,-42],[-70,-40],[-71,-36],[-71,-30],[-70,-25],[-70,-18],[-75,-14],[-77,-2],[-80,-2],[-80,0],[-77,8]],
  [[-9,39],[-9,37],[-6,36],[-4,36],[-1,37],[0,38],[1,40],[2,41],[3,43],[4,43],[5,43],[6,43],[7,44],[9,44],[10,44],[12,44],[14,44],[14,45],[16,45],[16,44],[17,43],[19,41],[20,40],[22,38],[22,37],[21,37],[22,36],[23,37],[24,37],[22,38],[26,40],[28,41],[30,41],[30,43],[30,46],[28,46],[26,44],[24,47],[22,48],[20,49],[18,50],[16,50],[14,51],[12,55],[10,57],[8,57],[5,59],[5,62],[6,63],[8,64],[14,65],[18,68],[20,70],[22,70],[28,71],[30,70],[28,69],[26,68],[24,64],[22,62],[20,60],[18,57],[17,56],[14,55],[10,55],[8,55],[5,53],[2,52],[0,51],[-2,51],[-3,50],[-5,48],[-5,46],[-3,44],[-8,44],[-9,39]],
  [[7,44],[9,44],[10,44],[12,44],[14,44],[14,45],[15,44],[15,42],[15,40],[16,40],[18,40],[16,38],[15,38],[14,39],[14,41],[12,42],[10,43],[9,44],[7,44]],
  [[-5,50],[-3,50],[-1,51],[1,51],[1,52],[0,53],[-2,54],[-3,54],[-4,53],[-3,51],[-5,51],[-5,52],[-5,54],[-4,56],[-3,58],[-2,58],[0,58],[1,57],[-1,57],[-2,56],[-3,56],[-5,57],[-6,58],[-6,56],[-5,54],[-3,53],[-3,51],[-5,50]],
  [[-5,36],[0,36],[5,37],[10,33],[15,33],[20,33],[25,31],[30,31],[33,30],[35,30],[32,29],[36,22],[38,14],[43,12],[45,12],[50,12],[51,11],[43,11],[41,10],[42,5],[42,0],[40,-5],[40,-10],[36,-18],[35,-23],[33,-27],[29,-30],[27,-34],[26,-34],[20,-34],[18,-35],[17,-33],[14,-30],[14,-26],[12,-17],[12,-12],[10,-2],[8,4],[3,5],[0,5],[-2,5],[-5,5],[-8,5],[-15,10],[-16,12],[-17,15],[-17,21],[-13,27],[-5,34],[-5,36]],
  [[28,41],[30,41],[36,36],[36,31],[34,31],[34,26],[36,22],[38,14],[43,12],[45,12],[50,12],[51,11],[56,22],[58,23],[60,24],[65,25],[68,23],[70,22],[72,20],[74,16],[76,12],[77,8],[80,10],[80,14],[82,14],[83,17],[86,20],[88,22],[90,22],[92,22],[95,22],[98,16],[100,14],[102,2],[104,1],[105,4],[105,10],[108,16],[108,22],[110,20],[113,22],[117,24],[121,22],[121,25],[120,28],[122,30],[122,32],[121,37],[122,40],[125,40],[128,38],[129,35],[127,34],[125,36],[126,38],[128,40],[130,42],[131,43],[130,44],[135,46],[140,46],[142,47],[140,54],[141,56],[143,58],[145,59],[152,59],[153,58],[155,57],[158,54],[163,55],[166,54],[168,54],[170,63],[163,68],[162,70],[158,72],[155,70],[150,72],[145,74],[140,74],[135,72],[130,70],[128,66],[120,68],[118,72],[112,73],[105,77],[95,80],[85,80],[78,78],[72,74],[68,72],[62,68],[58,64],[56,60],[55,55],[50,55],[48,52],[48,46],[47,43],[42,42],[40,42],[38,42],[35,42],[30,45],[28,46],[26,44],[26,42],[28,41]],
  [[114,-22],[114,-26],[115,-29],[118,-33],[121,-34],[124,-34],[129,-35],[133,-35],[138,-35],[140,-36],[148,-38],[150,-37],[152,-32],[153,-27],[153,-24],[150,-22],[148,-20],[148,-18],[145,-18],[143,-15],[141,-14],[140,-17],[138,-18],[136,-16],[136,-14],[132,-12],[130,-12],[127,-14],[122,-20],[122,-22],[118,-22],[114,-22]],
  [[-44,60],[-43,65],[-45,70],[-44,72],[-42,75],[-38,77],[-30,78],[-22,78],[-18,77],[-17,76],[-20,73],[-22,70],[-22,68],[-25,67],[-30,66],[-35,66],[-40,65],[-44,60]],
  [[130,31],[131,33],[132,34],[133,35],[135,35],[136,36],[138,37],[140,38],[141,39],[141,41],[140,41],[141,42],[143,44],[145,44],[143,43],[141,42],[140,41],[141,39],[140,38],[138,37],[135,35],[133,34],[131,32],[130,31]],
  [[-24,64],[-22,64],[-14,64],[-10,63],[-13,65],[-14,66],[-20,66],[-24,65],[-24,64]],
  [[172,-40],[174,-39],[175,-37],[174,-36],[173,-35],[172,-37],[170,-38],[172,-40],[170,-43],[170,-44],[171,-46],[169,-46],[168,-44],[169,-43],[170,-43]],
  [[44,-12],[49,-15],[50,-16],[50,-20],[48,-25],[44,-25],[43,-22],[44,-17],[44,-12]],
]

// ── Helpers ───────────────────────────────────────────────────────────────
function pip(lng, lat, poly) {
  let inside = false
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi,yi] = poly[i], [xj,yj] = poly[j]
    if ((yi > lat) !== (yj > lat) && lng < (xj-xi)*(lat-yi)/(yj-yi)+xi) inside = !inside
  }
  return inside
}
function onLand(lng, lat) { return CONTINENTS.some(p => pip(lng, lat, p)) }

function sampleOutline(pts, sp) {
  const out = []
  for (let i = 0; i < pts.length; i++) {
    const [x1,y1] = pts[i], [x2,y2] = pts[(i+1) % pts.length]
    const n = Math.max(1, Math.ceil(Math.hypot(x2-x1, y2-y1) / sp))
    for (let s = 0; s < n; s++) { const t=s/n; out.push([x1+(x2-x1)*t, y1+(y2-y1)*t]) }
  }
  return out
}

// ── Glow sprite factory ───────────────────────────────────────────────────
function makeSprite(r, g, b, sz = 64) {
  const c = document.createElement('canvas')
  c.width = c.height = sz
  const x = c.getContext('2d')
  const g2 = x.createRadialGradient(sz/2,sz/2,0, sz/2,sz/2,sz/2)
  g2.addColorStop(0,   `rgba(${r},${g},${b},1)`)
  g2.addColorStop(0.18,`rgba(${r},${g},${b},0.7)`)
  g2.addColorStop(0.45,`rgba(${r},${g},${b},0.18)`)
  g2.addColorStop(1,   `rgba(${r},${g},${b},0)`)
  x.fillStyle = g2
  x.fillRect(0,0,sz,sz)
  return c
}

// coast = warm white, land fill = warm dimmer, ocean = cool blue-white
const SPRITE_COAST = makeSprite(255, 248, 235)
const SPRITE_LAND  = makeSprite(255, 235, 200)
const SPRITE_OCEAN = makeSprite(180, 215, 255)

// ── Config ────────────────────────────────────────────────────────────────
const cfg = {
  spacing:    3,
  landCount:  2000,
  oceanCount: 320,
  coastGlow:  1.0,
  landGlow:   0.6,
  oceanGlow:  0.5,
  shimmer:    0.15,
  speed:      0.0025,
}

// ── State ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c')
const ctx    = canvas.getContext('2d')
let W, H, GLOBE_R
let nodes = [], sortBuf = []
let rotY = 0.3, rotX = 0.35
let isDrag = false, lastX = 0, lastY = 0, velX = 0, velY = 0
let rafId, startTime = performance.now()

// ── Build ─────────────────────────────────────────────────────────────────
function build() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2)
  const Wl = window.innerWidth, Hl = window.innerHeight
  canvas.width  = Wl * dpr; canvas.height = Hl * dpr
  canvas.style.width = Wl+'px'; canvas.style.height = Hl+'px'
  ctx.scale(dpr, dpr)
  W = Wl; H = Hl

  GLOBE_R = Math.min(W, H) * 0.36
  const cx = W/2, cy = H/2

  const geo = CONTINENTS.flatMap(c => sampleOutline(c, cfg.spacing))
  const coast = geo.map(([lng, lat]) => {
    const theta = ((90 - lat) * Math.PI) / 180
    const phi   = -(lng * Math.PI) / 180
    const sx = GLOBE_R * Math.sin(theta) * Math.cos(phi)
    const sy = GLOBE_R * Math.cos(theta)
    const sz = GLOBE_R * Math.sin(theta) * Math.sin(phi)
    return { sx, sy, sz, x:cx+sx, y:cy+sy, z3:0, coast:true, phase: Math.random()*Math.PI*2 }
  })

  // Land fill — puntos aleatorios dentro de continentes
  const land = []
  let lt = 0
  while (land.length < cfg.landCount && lt < cfg.landCount * 8) {
    lt++
    const theta = Math.acos(2*Math.random()-1)
    const phi   = Math.random()*Math.PI*2
    const lat = 90 - theta*180/Math.PI
    const lng = -phi*180/Math.PI
    if (!onLand(lng, lat)) continue
    const sx = GLOBE_R * Math.sin(theta) * Math.cos(phi)
    const sy = GLOBE_R * Math.cos(theta)
    const sz = GLOBE_R * Math.sin(theta) * Math.sin(phi)
    land.push({ sx, sy, sz, x:cx+sx, y:cy+sy, z3:0, type:'land', phase: Math.random()*Math.PI*2 })
  }

  // Ocean fill
  const ocean = []
  let ot = 0
  while (ocean.length < cfg.oceanCount && ot < cfg.oceanCount * 6) {
    ot++
    const theta = Math.acos(2*Math.random()-1)
    const phi   = Math.random()*Math.PI*2
    const lat = 90 - theta*180/Math.PI
    const lng = -phi*180/Math.PI
    if (onLand(lng, lat)) continue
    const sx = GLOBE_R * Math.sin(theta) * Math.cos(phi)
    const sy = GLOBE_R * Math.cos(theta)
    const sz = GLOBE_R * Math.sin(theta) * Math.sin(phi)
    ocean.push({ sx, sy, sz, x:cx+sx, y:cy+sy, z3:0, type:'ocean', phase: Math.random()*Math.PI*2 })
  }

  // Mark coast type
  coast.forEach(n => n.type = 'coast')

  nodes = [...ocean, ...land, ...coast]  // coast on top for z-sort priority
  sortBuf = nodes.slice()

  document.getElementById('vCoastN').textContent = coast.length
  document.getElementById('vLandN').textContent  = land.length
  document.getElementById('vOceanN').textContent = ocean.length
}

// ── Draw ──────────────────────────────────────────────────────────────────
function draw(ts) {
  rafId = requestAnimationFrame(draw)
  const t = (ts - startTime) * 0.001
  ctx.clearRect(0, 0, W, H)

  // Subtle radial bg
  const bg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7)
  bg.addColorStop(0,   'rgba(6,10,22,0.6)')
  bg.addColorStop(0.5, 'rgba(2,4,10,0.4)')
  bg.addColorStop(1,   'rgba(0,0,0,0)')
  ctx.fillStyle = bg
  ctx.fillRect(0, 0, W, H)

  if (!isDrag) {
    velX *= 0.95; velY *= 0.95
    rotY += velX + cfg.speed
    rotX = Math.max(-1.2, Math.min(1.2, rotX + velY))
  }

  const cx = W/2, cy = H/2
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY)
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX)
  const N = nodes.length

  for (let i = 0; i < N; i++) {
    const n = nodes[i]
    const x1 =  n.sx*cosY + n.sz*sinY
    const z1 = -n.sx*sinY + n.sz*cosY
    const y1 =  n.sy*cosX - z1*sinX
    const z2 =  n.sy*sinX + z1*cosX
    n.x = cx+x1; n.y = cy-y1; n.z3 = z2
  }

  // Sort back→front
  for (let i = 0; i < N; i++) sortBuf[i] = nodes[i]
  sortBuf.sort((a, b) => a.z3 - b.z3)

  for (let i = 0; i < N; i++) {
    const n = sortBuf[i]
    const depth = (n.z3 + GLOBE_R) / (2 * GLOBE_R)
    if (depth < 0.02) continue

    const shimmer = 1 - cfg.shimmer + cfg.shimmer * Math.sin(t * 1.4 + n.phase)
    let baseOpacity, glowSz, sprite
    if (n.type === 'coast') {
      baseOpacity = (0.15 + depth * 0.85) * shimmer * cfg.coastGlow
      glowSz      = (3 + depth * 22) * cfg.coastGlow
      sprite      = SPRITE_COAST
    } else if (n.type === 'land') {
      baseOpacity = (0.08 + depth * 0.55) * shimmer * cfg.landGlow
      glowSz      = (2 + depth * 14) * cfg.landGlow
      sprite      = SPRITE_LAND
    } else {
      baseOpacity = (0.04 + depth * 0.38) * shimmer * cfg.oceanGlow
      glowSz      = (2 + depth * 10) * cfg.oceanGlow
      sprite      = SPRITE_OCEAN
    }
    ctx.globalAlpha = Math.min(1, baseOpacity)
    ctx.drawImage(sprite, n.x - glowSz/2, n.y - glowSz/2, glowSz, glowSz)
  }
  ctx.globalAlpha = 1
}

// ── Interaction ───────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => { isDrag=true; lastX=e.clientX; lastY=e.clientY; velX=velY=0 })
window.addEventListener('mousemove', e => {
  if (!isDrag) return
  velX = (e.clientX-lastX)*0.008; velY = (e.clientY-lastY)*0.005
  rotY += velX; rotX = Math.max(-1.2, Math.min(1.2, rotX+velY))
  lastX=e.clientX; lastY=e.clientY
})
window.addEventListener('mouseup', () => isDrag = false)
window.addEventListener('wheel', e => {
  rotY += e.deltaX*0.003
  rotX = Math.max(-1.2, Math.min(1.2, rotX + e.deltaY*0.003))
}, { passive:true })
window.addEventListener('resize', () => {
  cancelAnimationFrame(rafId)
  ctx.setTransform(1,0,0,1,0,0)
  build(); draw(performance.now())
})

// ── Sliders ───────────────────────────────────────────────────────────────
function slider(id, valId, apply, fmt) {
  const el = document.getElementById(id), vl = document.getElementById(valId)
  el.addEventListener('input', () => {
    apply(parseFloat(el.value)); vl.textContent = fmt(parseFloat(el.value))
    cancelAnimationFrame(rafId); ctx.setTransform(1,0,0,1,0,0); build(); draw(performance.now())
  })
}
slider('sSpacing', 'vCoastN', v => cfg.spacing = v, () => {
  const geo = CONTINENTS.flatMap(c => sampleOutline(c, cfg.spacing)); return geo.length
})
slider('sLand',  'vLandN',  v => cfg.landCount  = v, v => Math.round(v))
slider('sOcean', 'vOceanN', v => cfg.oceanCount = v, v => Math.round(v))
slider('sCG',    'vCG',     v => cfg.coastGlow  = v/10, v => (v/10).toFixed(1))
slider('sLG',    'vLG',     v => cfg.landGlow   = v/10, v => (v/10).toFixed(1))
slider('sOG',    'vOG',     v => cfg.oceanGlow  = v/10, v => (v/10).toFixed(1))
slider('sShim',  'vShim',   v => { cfg.shimmer = v/100; /* no rebuild */ }, v => (v/100).toFixed(2))
slider('sSpd',   'vSpd',    v => { cfg.speed = v*0.00025; /* no rebuild */ }, v => (v*0.1).toFixed(1)+'x')

// ── Init ──────────────────────────────────────────────────────────────────
build()
requestAnimationFrame(draw)
</script>
</body>
</html>
