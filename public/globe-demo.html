// ── Geometry helpers ──────────────────────────────────────────────────────
function pointInPolygon(lng, lat, poly) {
  let inside = false
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const [xi, yi] = poly[i], [xj, yj] = poly[j]
    if ((yi > lat) !== (yj > lat) && lng < (xj - xi) * (lat - yi) / (yj - yi) + xi)
      inside = !inside
  }
  return inside
}

function isOnLand(lng, lat) {
  return CONTINENTS.some(p => pointInPolygon(lng, lat, p))
}

function sampleOutline(outline, spacing = 3) {
  const pts = []
  for (let i = 0; i < outline.length; i++) {
    const [x1, y1] = outline[i]
    const [x2, y2] = outline[(i + 1) % outline.length]
    const dist = Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2)
    const steps = Math.max(1, Math.ceil(dist / spacing))
    for (let s = 0; s < steps; s++) {
      const t = s / steps
      pts.push([x1 + (x2 - x1) * t, y1 + (y2 - y1) * t])
    }
  }
  return pts
}

// ── Config (mutable from sliders) ────────────────────────────────────────
const cfg = {
  oceanCount: 320,
  speed: 0.0025,
  lineFactor: 0.24,
  coastR: 1.6,
  oceanR: 0.7,
}

// ── Main ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c')
const ctx = canvas.getContext('2d')

let W, H, GLOBE_R, LINE_D, LD2
let nodes = []
let GCOLS, GROWS, grid = []
let sortBuf = []
let rafId

let rotY = 0.3, rotX = 0.4
let isDragging = false, lastX = 0, lastY = 0, velX = 0, velY = 0

function build() {
  W = canvas.width  = window.innerWidth  * (window.devicePixelRatio || 1)
  H = canvas.height = window.innerHeight * (window.devicePixelRatio || 1)
  canvas.style.width  = window.innerWidth  + 'px'
  canvas.style.height = window.innerHeight + 'px'

  const dpr = window.devicePixelRatio || 1
  const Wl  = window.innerWidth, Hl = window.innerHeight
  GLOBE_R = Math.min(Wl, Hl) * 0.34
  LINE_D  = GLOBE_R * cfg.lineFactor
  LD2     = LINE_D * LINE_D

  const cx = Wl / 2, cy = Hl / 2

  // Coast nodes
  const geoPoints = CONTINENTS.flatMap(c => sampleOutline(c, 3))
  const coastNodes = geoPoints.map(([lng, lat]) => {
    const theta = ((90 - lat) * Math.PI) / 180
    const phi   = -(lng * Math.PI) / 180
    const sx = GLOBE_R * Math.sin(theta) * Math.cos(phi)
    const sy = GLOBE_R * Math.cos(theta)
    const sz = GLOBE_R * Math.sin(theta) * Math.sin(phi)
    return { x: cx+sx, y: cy+sy, sx, sy, sz, r: cfg.coastR, a: 0.65 }
  })

  // Ocean nodes (water only)
  const oceanNodes = []
  let attempts = 0
  while (oceanNodes.length < cfg.oceanCount && attempts < cfg.oceanCount * 5) {
    attempts++
    const theta = Math.acos(2 * Math.random() - 1)
    const phi   = Math.random() * Math.PI * 2
    const lat = 90 - (theta * 180) / Math.PI
    const lng = -(phi * 180) / Math.PI
    if (isOnLand(lng, lat)) continue
    const sx = GLOBE_R * Math.sin(theta) * Math.cos(phi)
    const sy = GLOBE_R * Math.cos(theta)
    const sz = GLOBE_R * Math.sin(theta) * Math.sin(phi)
    oceanNodes.push({ x: cx+sx, y: cy+sy, sx, sy, sz, r: cfg.oceanR, a: 0.18 })
  }

  nodes = [...coastNodes, ...oceanNodes]
  sortBuf = nodes.slice()

  GCOLS = Math.ceil(Wl / LINE_D) + 2
  GROWS = Math.ceil(Hl / LINE_D) + 2
  grid  = Array.from({ length: GCOLS * GROWS }, () => [])
}

function draw() {
  rafId = requestAnimationFrame(draw)

  const Wl = window.innerWidth, Hl = window.innerHeight
  ctx.clearRect(0, 0, W, H)

  // Rotate
  if (!isDragging) {
    velX *= 0.95
    velY *= 0.95
    rotY += velX + cfg.speed
    rotX = Math.max(-1.2, Math.min(1.2, rotX + velY))
  }

  const cx = Wl / 2, cy = Hl / 2
  const cosY = Math.cos(rotY), sinY = Math.sin(rotY)
  const cosX = Math.cos(rotX), sinX = Math.sin(rotX)
  const N = nodes.length

  // Apply rotation (precomputed sphere coords)
  for (let i = 0; i < N; i++) {
    const n = nodes[i]
    const x1 =  n.sx * cosY + n.sz * sinY
    const z1 = -n.sx * sinY + n.sz * cosY
    const y1 =  n.sy * cosX - z1 * sinX
    const z2 =  n.sy * sinX + z1 * cosX
    n.x = cx + x1; n.y = cy - y1; n.z3 = z2
  }

  // Rebuild spatial grid
  for (let gi = 0; gi < grid.length; gi++) grid[gi].length = 0
  for (let i = 0; i < N; i++) {
    const col = Math.floor(nodes[i].x / LINE_D)
    const row = Math.floor(nodes[i].y / LINE_D)
    if (col >= 0 && col < GCOLS && row >= 0 && row < GROWS)
      grid[row * GCOLS + col].push(i)
  }

  // Lines (spatial grid O(N·k))
  for (let i = 0; i < N; i++) {
    const a   = nodes[i]
    const col = Math.floor(a.x / LINE_D)
    const row = Math.floor(a.y / LINE_D)
    for (let dr = -1; dr <= 1; dr++) {
      for (let dc = -1; dc <= 1; dc++) {
        const c2 = col+dc, r2 = row+dr
        if (c2 < 0 || c2 >= GCOLS || r2 < 0 || r2 >= GROWS) continue
        for (const j of grid[r2 * GCOLS + c2]) {
          if (j <= i) continue
          const b = nodes[j]
          const dx = a.x - b.x, dy = a.y - b.y
          const d2 = dx*dx + dy*dy
          if (d2 >= LD2) continue
          const depth = ((a.z3 + b.z3) / 2 + GLOBE_R) / (2 * GLOBE_R)
          if (depth <= 0) continue
          const t = 1 - Math.sqrt(d2) / LINE_D
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y)
          ctx.strokeStyle = `rgba(255,255,255,${t * 0.5 * depth})`
          ctx.lineWidth = t * 0.8
          ctx.stroke()
        }
      }
    }
  }

  // Nodes (sorted back→front, backface culled)
  for (let i = 0; i < N; i++) sortBuf[i] = nodes[i]
  sortBuf.sort((a, b) => a.z3 - b.z3)
  for (let i = 0; i < N; i++) {
    const n = sortBuf[i]
    const depth = (n.z3 + GLOBE_R) / (2 * GLOBE_R)
    if (depth < 0.02) continue
    const opacity = 0.05 + depth * 0.7
    const radius  = n.r * (0.4 + depth * 1.0)
    ctx.beginPath()
    ctx.arc(n.x, n.y, radius, 0, Math.PI * 2)
    ctx.fillStyle = `rgba(255,255,255,${Math.min(1, n.a + opacity * (n.a > 0.3 ? 0.3 : 0))})`
    ctx.fill()
  }
}

// ── Interaction ───────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  isDragging = true; lastX = e.clientX; lastY = e.clientY; velX = velY = 0
})
window.addEventListener('mousemove', e => {
  if (!isDragging) return
  velX = (e.clientX - lastX) * 0.008
  velY = (e.clientY - lastY) * 0.005
  rotY += velX; rotX = Math.max(-1.2, Math.min(1.2, rotX + velY))
  lastX = e.clientX; lastY = e.clientY
})
window.addEventListener('mouseup', () => { isDragging = false })
window.addEventListener('wheel', e => {
  rotY += e.deltaX * 0.003
  rotX = Math.max(-1.2, Math.min(1.2, rotX + e.deltaY * 0.003))
}, { passive: true })

window.addEventListener('resize', () => {
  cancelAnimationFrame(rafId)
  build()
  draw()
})

// ── Controls ──────────────────────────────────────────────────────────────
function bindSlider(id, valId, get, set, fmt) {
  const sl = document.getElementById(id)
  const vl = document.getElementById(valId)
  sl.addEventListener('input', () => {
    set(parseFloat(sl.value))
    vl.textContent = fmt(parseFloat(sl.value))
    cancelAnimationFrame(rafId)
    build(); draw()
  })
}

bindSlider('sOcean', 'vOcean',
  () => cfg.oceanCount,
  v => cfg.oceanCount = v,
  v => Math.round(v).toString()
)
bindSlider('sSpeed', 'vSpeed',
  () => cfg.speed,
  v => cfg.speed = v * 0.00025,
  v => (v * 0.1).toFixed(1) + 'x'
)
bindSlider('sLines', 'vLines',
  () => cfg.lineFactor,
  v => { cfg.lineFactor = v / 100; LINE_D = GLOBE_R * cfg.lineFactor; LD2 = LINE_D*LINE_D },
  v => (v/100).toFixed(2)
)
bindSlider('sCoast', 'vCoast',
  () => cfg.coastR,
  v => { cfg.coastR = v/10; nodes.slice(0, nodes.length - cfg.oceanCount).forEach(n => n.r = v/10) },
  v => (v/10).toFixed(1)
)
bindSlider('sOceanR', 'vOceanR',
  () => cfg.oceanR,
  v => { cfg.oceanR = v/10; nodes.slice(-cfg.oceanCount).forEach(n => n.r = v/10) },
  v => (v/10).toFixed(1)
)

// ── Init ──────────────────────────────────────────────────────────────────
build()
draw()
</script>
