<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>unickeys — Animation v6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; height: 100vh; overflow: hidden; }
  canvas { display: block; position: fixed; inset: 0; width: 100%; height: 100%; }

  .nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; display: flex; align-items: center; padding: 0 32px; border-bottom: 1px solid rgba(255,255,255,0.10); justify-content: space-between; z-index: 10; background: #000; }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
  .nav-btns { display: flex; align-items: center; gap: 10px; }
  .nav-btn { padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 500; border: none; }
  .nav-btn.ghost { background: transparent; border: 1px solid rgba(255,255,255,0.20); color: #fff; }
  .nav-btn.ghost:hover { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); }
  .nav-btn.solid { background: #fff; color: #000; display: flex; align-items: center; gap: 6px; }

  /* Hero content */
  .hero { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 5; pointer-events: none; }
  /* Border beam card */
  @property --beam-angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
  @keyframes beam-rotate { to { --beam-angle: 360deg; } }

  .hero-card { position: relative; border-radius: 16px; padding: 1px; background: rgba(255,255,255,0.07); overflow: hidden; animation: heroin 1.1s cubic-bezier(0.16,1,0.3,1) both; }
  .hero-card::before { content: ''; position: absolute; inset: -100%; background: conic-gradient(from var(--beam-angle), transparent 0deg, transparent 310deg, rgba(255,255,255,0.08) 340deg, rgba(255,255,255,0.85) 355deg, rgba(255,255,255,0.08) 360deg); animation: beam-rotate 4s linear infinite; }

  .hero-inner { display: flex; flex-direction: column; align-items: center; gap: 20px; background: #000; border-radius: 15px; padding: 48px 56px; position: relative; }
  @keyframes heroin { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .hero-title { font-size: clamp(32px, 5vw, 56px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; text-align: center; }
  .hero-tag { font-size: clamp(13px, 1.4vw, 16px); color: rgba(255,255,255,0.45); text-align: center; max-width: 400px; line-height: 1.5; letter-spacing: 0.01em; }
  .hero-cta { pointer-events: all; margin-top: 8px; display: flex; align-items: center; gap: 10px; }
  .btn-primary { padding: 12px 28px; border-radius: 6px; font-size: 15px; font-weight: 500; background: #fff; color: #000; cursor: pointer; border: none; display: flex; align-items: center; gap: 8px; transition: background 0.15s, transform 0.15s; }
  .btn-primary:hover { background: rgba(255,255,255,0.88); transform: translateY(-1px); }
  .btn-secondary { padding: 12px 24px; border-radius: 6px; font-size: 15px; font-weight: 500; background: transparent; color: rgba(255,255,255,0.6); cursor: pointer; border: 1px solid rgba(255,255,255,0.18); transition: all 0.15s; }
  .btn-secondary:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="nav">
  <div class="nav-logo">
    <svg width="36" height="36" viewBox="0 0 200 200" fill="none">
      <path d="M100 100V42" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 100L148 128" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 100L52 128" stroke="white" stroke-width="3" stroke-linecap="round"/>
      <path d="M100 114C107.732 114 114 107.732 114 100C114 92.268 107.732 86 100 86C92.268 86 86 92.268 86 100C86 107.732 92.268 114 100 114Z" fill="white" stroke="white" stroke-width="4.5"/>
      <path d="M100 50C104.418 50 108 46.4183 108 42C108 37.5817 104.418 34 100 34C95.5817 34 92 37.5817 92 42C92 46.4183 95.5817 50 100 50Z" fill="white" stroke="white" stroke-width="4.5"/>
      <path d="M148 136C152.418 136 156 132.418 156 128C156 123.582 152.418 120 148 120C143.582 120 140 123.582 140 128C140 132.418 143.582 136 148 136Z" fill="white" stroke="white" stroke-width="4.5"/>
      <path d="M52 136C56.4183 136 60 132.418 60 128C60 123.582 56.4183 120 52 120C47.5817 120 44 123.582 44 128C44 132.418 47.5817 136 52 136Z" fill="white" stroke="white" stroke-width="4.5"/>
    </svg>
    unickeys
  </div>
  <div class="nav-btns">
    <button class="nav-btn solid" style="display:flex;align-items:center;gap:6px;white-space:nowrap">
      Empezar ahora
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
    </button>
    <button class="nav-btn ghost">Iniciar sesión</button>
  </div>
</div>

<div class="hero">
  <div class="hero-card">
    <div class="hero-inner">
      <h1 class="hero-title">unickeys</h1>
      <p class="hero-tag">Certificación y verificación de datos mediante tecnología blockchain.</p>
      <div class="hero-cta">
        <button class="btn-primary">
          Empezar ahora
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"/></svg>
        </button>
        <button class="btn-secondary">¿Cómo funciona?</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, DPR = 1;

const NODE_COUNT  = 300;
const LINE_DIST   = 120;

let ghosts = [];

function buildNodes() {
  ghosts = [];
  const cols = Math.ceil(Math.sqrt(NODE_COUNT * W / H));
  const rows = Math.ceil(NODE_COUNT / cols);
  const cellW = W / cols, cellH = H / rows;

  for (let r = 0; r < rows && ghosts.length < NODE_COUNT; r++) {
    for (let c = 0; c < cols && ghosts.length < NODE_COUNT; c++) {
      const g = {
        bx: cellW * c + cellW * 0.1 + Math.random() * cellW * 0.8,
        by: cellH * r + cellH * 0.1 + Math.random() * cellH * 0.8,
        r:  0.8 + Math.random() * 1.6,
        waveAmp:  5 + Math.random() * 10,
        waveFreq: 0.35 + Math.random() * 0.4,
        brightness: 0.35 + Math.random() * 0.5,
        ox: 0, oy: 0,
      };
      g.wavePhaseX = (g.bx / W + g.by / H) * Math.PI * 4;
      g.wavePhaseY = (g.bx / W - g.by / H) * Math.PI * 3;
      ghosts.push(g);
    }
  }
}

const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp  = (a,b,t) => a + (b-a)*t;

let mouse = { x: -9999, y: -9999 };
const MOUSE_RADIUS  = 180;
const MOUSE_ATTRACT = 55;

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

let time = 0;

function draw() {
  time += 0.016;

  ctx.save();
  ctx.scale(DPR, DPR);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const gPos = ghosts.map(g => {
    const wx = g.bx + Math.sin(time * g.waveFreq + g.wavePhaseX) * g.waveAmp;
    const wy = g.by + Math.cos(time * g.waveFreq * 0.8 + g.wavePhaseY) * g.waveAmp * 0.7;
    const dx = mouse.x - wx;
    const dy = mouse.y - wy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const pull = dist < MOUSE_RADIUS ? (1 - dist / MOUSE_RADIUS) * MOUSE_ATTRACT : 0;
    const targetOx = dist > 0 ? (dx / dist) * pull : 0;
    const targetOy = dist > 0 ? (dy / dist) * pull : 0;
    g.ox = lerp(g.ox, targetOx, 0.04);
    g.oy = lerp(g.oy, targetOy, 0.04);
    const nearFactor = Math.max(0, 1 - Math.sqrt((mouse.x - wx) ** 2 + (mouse.y - wy) ** 2) / MOUSE_RADIUS);
    return {
      x: wx + g.ox,
      y: wy + g.oy,
      r: g.r + nearFactor * 1.0,
      brightness: g.brightness + nearFactor * 0.4,
    };
  });

  // Lines
  for (let i = 0; i < gPos.length - 1; i++) {
    for (let j = i + 1; j < gPos.length; j++) {
      const a = gPos[i], b = gPos[j];
      const dx = a.x-b.x, dy = a.y-b.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < LINE_DIST * LINE_DIST) {
        const d = Math.sqrt(d2);
        ctx.beginPath();
        ctx.strokeStyle = `rgba(255,255,255,${(1-d/LINE_DIST) * 0.18})`;
        ctx.lineWidth = 0.6;
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }
  }

  // Dots
  gPos.forEach(g => {
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${g.brightness * 0.75})`;
    ctx.fill();
  });

  ctx.restore();
  requestAnimationFrame(draw);
}

function resize() {
  DPR = window.devicePixelRatio || 1;
  W   = window.innerWidth;
  H   = window.innerHeight;
  canvas.width  = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  buildNodes();
}

window.addEventListener('resize', resize);
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
